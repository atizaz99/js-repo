<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dashboard | Remix Edition</title>
    <!-- Bootstrap & Remix Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        .skeleton {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 800px 104px;
            height: 12px;
            width: 100%;
            border-radius: 4px;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }
        .ri-icon-sm { font-size: 1.1rem; vertical-align: middle; }
    </style>
</head>
<body class="bg-light p-5">

    <div class="container py-5">
        <div id="card-grid" class="row g-4">
            <!-- Cards will be injected here -->
            
        </div>
        

    </div>

<script>
    const userGrid = document.getElementById('card-grid');
    function createUserCard(user){
        // 1. create column 
        const col = document.createElement('div');
        col.className = 'col-md-3';

        // 2. create Card container
        const card = document.createElement('div');
        card.className = 'card h-100 border-0 shadow-sm rounded-4 overflow-hidden';

        const cardHeader = document.createElement('div');
        cardHeader.className= 'card-header bg-transparent border-bottom border-secondary border-opacity-10 p-4 d-flex justify-content-between align-items-center';
       

        // header titile 
        const headerTitle = document.createElement('span');
        headerTitle.className = 'fw-bold text-muted text-uppercase small tracking-wider';
        headerTitle.textContent = user.name;

        // header icon 
        const headerIcon = document.createElement('i');
        headerIcon.className = 'ri-more-2-fill text-muted cursor-pointer';

        cardHeader.append(headerTitle, headerIcon)



        // 3. card body 
        const cardBody = document.createElement('div');
        cardBody.className = 'card-body p-4';

        // descriptoin 
        const descriptoin = document.createElement('div');
        
        const p = document.createElement('p');
        p.className = 'text-muted';
        p.textContent = user.description;

        descriptoin.appendChild(p);

        

        // 5. create title 
        const title = document.createElement('span');
        title.className = ' text-muted'
        title.textContent = user.role;

        // 5. create role text 
        // 4. create icon/ using remix 
        const iconContainer = document.createElement('div');
        iconContainer.className = 'mb-3 d-inline-flex align-items-center justify-content-between justify-content-center bg-primary-subtle text-primary rounded-circle';
        

        const icon = document.createElement('i');
        icon.className = 'ri-user-smile-line fs-3 ms-auto';
        iconContainer.append( title, icon);
        


        cardBody.append( descriptoin,  iconContainer);
        card.append(cardHeader, cardBody);
        col.appendChild(card);

        return col;


    }
    
    // 8. Render using a Fragment (Best Practice)
    const users = [
        { name: "Zain Ali", role: "Frontend Developer", description: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book." },
        { name: "Sara Khan", role: "UI/UX Designer", description: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book." },
        { name: "Ahmed Raza", role: "Backend Engineer", description: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book." },
        { name: "Karim Ali", role: 'Backend Engineer', description: "Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book."},
    ];

    const fragment = document.createDocumentFragment();
    users.forEach(user => {
        fragment.appendChild(createUserCard(user));

    });
    userGrid.appendChild(fragment);

</script>
</body>
</html>
