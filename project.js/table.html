<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dashboard | Remix Edition</title>
    <!-- Bootstrap & Remix Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        .skeleton {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 800px 104px;
            height: 12px;
            width: 100%;
            border-radius: 4px;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }
        .ri-icon-sm { font-size: 1.1rem; vertical-align: middle; }
    </style>
</head>
<body class="bg-light p-5">

<div class="container bg-white shadow-sm rounded-4 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold"><i class="ri-user-settings-line me-2"></i>User Management</h5>
        <button class="btn btn-dark btn-sm rounded-pill px-3" onclick="simulateLoad()">
            <i class="ri-refresh-line ri-icon-sm me-1"></i> Sync Data
        </button>
    </div>

    <div id="table-container" style="min-height: 300px;"></div>
</div>

<script>
    const mockData = [
        { id: 1, name: "Zain Ali", role: "Admin", status: "Active" },
        { id: 2, name: "Sara Khan", role: "Editor", status: "Away" },
        { id: 3, name: "Ahmed Raza", role: "Viewer", status: "Busy" }
    ];

    const config = {
        name: { label: 'Full Name', type:'text'},
        role: { label: 'Role', type:'text'},
        status: { label: 'Status', type: 'badge'}
    }

    const statusStyles = {
        'Active': 'bg-success-subtle text-success border-success',
        'Busy': 'bg-danger-subtle text-danger border-danger'
    };

    function showSkeleton(){
        const container = document.getElementById('table-container')
        container.innerHTML = `
        <table class = 'table align-middle'>
            <tbody>
                ${Array(3).fill(`<tr>${Array(4).fill('<td><div class="skeleton"></div></td>').join('')}`).join('')}
            </tbody>
        </table>
        
        `
    }
    function renderTable(){
        const container = document.getElementById('table-container');
        container.textContent = '';

        // creating table 
        const table = document.createElement('table')
        table.className = 'table table-hover align-middle';

        // header of table
        const thead = table.createTHead();
        const hRow = thead.insertRow();
        Object.values(config).forEach(conf => {
            const th = document.createElement('th');
            th.className = 'text-muted small text-uppercase fw-semibold';
            th.textContent = conf.label;
            hRow.appendChild(th)
        });
        const actionTh = document.createElement('th');
        actionTh.className = 'text-muted small text-uppercase fw-semibold';
        actionTh.textContent = 'Actions';
        hRow.appendChild(actionTh);
        

        // tabble body 

        const tbody = table.createTBody();
        mockData.forEach( item =>{
            const bRow = tbody.insertRow();
            Object.keys(config).forEach(key => {
                const cell = bRow.insertCell();
                const fieldConfig = config[key];
                if (fieldConfig.type === 'badge'){
                    const badge = document.createElement('span');
                    badge.textContent = item[key];
                    const statusValue = item[key];
                    const color = statusStyles[statusValue] ?? 'bg-light text-dark border';

                    badge.className = `badge border ${color} rounded-pill px-3`;
                    cell.appendChild(badge);
                } else {
                    cell.textContent = item[key];
                }

            });
            const actionCell = bRow.insertCell();
            actionCell.textContent = 'Actoin btn';


        });

        container.appendChild(table);

    }

    function simulateLoad(){
        showSkeleton();
        setTimeout(renderTable, 1000)
    }
    document.addEventListener('DOMContentLoaded', simulateLoad);
</script>
</body>
</html>
